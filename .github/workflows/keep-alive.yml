name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Backend
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        run: |
          curl -s --max-time 60 https://svadista-backend.onrender.com/api/health
          echo "Backend pinged successfully"
